<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printer</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="card">
  <h1>🖨️ Print Receipt</h1>
  <p class="subtitle">Fill in the details and send to the printer.</p>

  <label for="title">To Do</label>
  <input id="title" type="text" placeholder="e.g. Order #1042" maxlength="40">

  <div class="time-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    <span id="clock">--:--:--</span>
  </div>

  <button id="btn" onclick="sendPrint()">Print</button>
  <div id="toast" class="toast"></div>

  <button id="history-btn" class="history-btn" onclick="toggleHistory()">History</button>
  <div id="history-panel" class="history-panel" style="display:none">
    <ul id="history-list" class="history-list"></ul>
  </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
