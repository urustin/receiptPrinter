<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Printer</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    /* ── 로그인 모달 ──────────────────────────────────── */
    #login-modal {
      position: fixed; inset: 0;
      background: #f5f5f7;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 52px 44px;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      max-width: 360px;
      width: 90%;
    }

    .login-icon  { font-size: 44px; margin-bottom: 14px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .login-sub   { font-size: 14px; color: #6e6e73; margin-bottom: 32px; }

    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px 20px;
      border: 1.5px solid #d2d2d7; border-radius: 12px;
      background: #fff; font-size: 15px; font-weight: 500;
      cursor: pointer; color: #1d1d1f; text-decoration: none;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .google-btn:hover { background: #f5f5f7; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }

    /* ── 앱 ───────────────────────────────────────────── */
    #app {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 32px 20px;
    }

    .hub-header {
      display: flex; align-items: center; justify-content: space-between;
      width: 100%; max-width: 420px;
      margin-bottom: 20px;
    }

    .hub {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .hub-icon  { font-size: 48px; margin-bottom: 4px; }
    .hub-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
    .hub-sub   { font-size: 14px; color: #6e6e73; margin-bottom: 12px; }

    .link-card {
      display: flex; align-items: center; gap: 14px;
      width: 100%; padding: 16px 20px;
      background: #fff; border: 1px solid #e5e5ea; border-radius: 14px;
      text-decoration: none; color: #1d1d1f;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
      transition: background .14s, box-shadow .14s, transform .1s;
    }
    .link-card:hover { background: #fafafa; box-shadow: 0 4px 16px rgba(0,0,0,.09); transform: translateY(-1px); }
    .link-card:active { transform: scale(.98); }

    .link-emoji { font-size: 22px; flex-shrink: 0; width: 36px; text-align: center; }
    .link-text  { flex: 1; }
    .link-name  { font-size: 15px; font-weight: 600; }
    .link-desc  { font-size: 12px; color: #6e6e73; margin-top: 2px; }
    .link-arrow { color: #c7c7cc; font-size: 16px; }

    .signout-btn {
      padding: 5px 14px;
      border: 1px solid #d2d2d7; border-radius: 8px;
      background: #fff; font-size: 13px;
      cursor: pointer; color: #1d1d1f;
      transition: background 0.15s;
    }
    .signout-btn:hover { background: #f5f5f7; }
  </style>
</head>
<body>

<!-- 로그인 모달 -->
<div id="login-modal">
  <div class="login-card">
    <div class="login-icon">🖨️</div>
    <div class="login-title">Printer</div>
    <div class="login-sub">print.ericfromkorea.com</div>
    <a href="/auth/login" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Google로 로그인
    </a>
  </div>
</div>

<!-- 앱 -->
<div id="app">
  <div class="hub-header">
    <span style="font-size:13px;color:#6e6e73;">print.ericfromkorea.com</span>
    <button class="signout-btn" onclick="logout()">로그아웃</button>
  </div>

  <div class="hub">
    <div class="hub-icon">🖨️</div>
    <div class="hub-title">Printer</div>

    <a href="/print" class="link-card">
      <span class="link-emoji">🖨️</span>
      <div class="link-text">
        <div class="link-name">Printer</div>
        <div class="link-desc">할 일 프린트 & 진행 현황</div>
      </div>
      <span class="link-arrow">›</span>
    </a>

    <a href="/manage_task" class="link-card">
      <span class="link-emoji">📋</span>
      <div class="link-text">
        <div class="link-name">태스크 관리</div>
        <div class="link-desc">에픽 · 태스크 · 서브태스크 추가/수정/삭제</div>
      </div>
      <span class="link-arrow">›</span>
    </a>

    <a href="/arrange_task" class="link-card">
      <span class="link-emoji">🗂️</span>
      <div class="link-text">
        <div class="link-name">에픽 → 태스크 배열</div>
        <div class="link-desc">드래그로 태스크를 에픽에 할당</div>
      </div>
      <span class="link-arrow">›</span>
    </a>

    <a href="/arrange_subtask" class="link-card">
      <span class="link-emoji">🔀</span>
      <div class="link-text">
        <div class="link-name">태스크 → 서브태스크 배열</div>
        <div class="link-desc">드래그로 서브태스크를 태스크에 할당</div>
      </div>
      <span class="link-arrow">›</span>
    </a>

    <a href="/settings" class="link-card" style="margin-top:8px;border-color:#e5e5ea;background:#fafafa">
      <span class="link-emoji">⚙️</span>
      <div class="link-text">
        <div class="link-name" style="color:#3a3a3c">설정</div>
        <div class="link-desc">Jira 연동 · 계정 관리</div>
      </div>
      <span class="link-arrow">›</span>
    </a>
  </div>
</div>

<script src="/auth.js"></script>
<script>initAuth();</script>
</body>
</html>
