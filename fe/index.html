<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Printer</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen" style="display:none;">
  <div class="login-card">
    <div class="login-icon">🖨️</div>
    <h1 class="login-title">Printer</h1>
    <p class="login-subtitle">Sign in to access the printer.</p>
    <a href="/auth/login" class="google-btn">
      <svg class="google-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>
  </div>
</div>

<div id="app" style="display:none;">
  <header class="app-header">
    <div style="display:flex;align-items:center;gap:12px">
      <a href="/hub" style="font-size:.8125rem;color:#0071e3;text-decoration:none;font-weight:500;">← 메인</a>
      <span class="app-logo">🖨️ Printer</span>
    </div>
    <div class="header-right">
      <span class="hub-btn" style="cursor:default;color:#6e6e73;pointer-events:none;">관리</span>
      <button class="signout-btn" onclick="logout()">Sign out</button>
    </div>
  </header>

  <main class="board">

    <!-- Print column -->
    <div class="column">
      <div class="col-header">
        <span class="col-title">Print</span>
      </div>
      <div class="col-body print-col">
        <input id="title" type="text" placeholder="할일 #1" maxlength="40"
               onkeydown="if(event.key==='Enter') sendPrint()">
        <button id="print-btn" onclick="sendPrint()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
          Print
        </button>
        <div id="toast" class="toast"></div>
      </div>
    </div>

    <!-- Progress column -->
    <div class="column">
      <div class="col-header">
        <span class="col-title">In Progress</span>
        <span class="col-count" id="progress-count">0</span>
      </div>
      <div class="col-body">
        <ul class="job-list" id="progress-list"></ul>
      </div>
    </div>

    <!-- Done column -->
    <div class="column">
      <div class="col-header">
        <span class="col-title">Done</span>
        <span class="col-count done-count" id="done-count">0</span>
      </div>
      <div class="col-body">
        <ul class="job-list" id="done-list"></ul>
      </div>
    </div>

  </main>
</div>

<script src="auth.js"></script>
<script src="script.js"></script>
</body>
</html>
