<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>태스크-서브태스크 배열</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      position: sticky; top: 0;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #d2d2d7;
      padding: 0 24px;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-left a {
      font-size: 13px; color: #0071e3; text-decoration: none; font-weight: 500;
    }
    .header-left a:hover { text-decoration: underline; }
    header h1 { font-size: 16px; font-weight: 600; }

    .sign-out-btn {
      padding: 5px 14px;
      border: 1px solid #d2d2d7; border-radius: 8px;
      background: #fff; font-size: 13px;
      cursor: pointer; color: #1d1d1f;
      transition: background 0.15s;
    }
    .sign-out-btn:hover { background: #f5f5f7; }

    /* ── Main layout ─────────────────────────────────── */
    main { padding: 24px; }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .columns { grid-template-columns: 1fr; }
    }

    .col-header {
      font-size: 12px; font-weight: 600;
      color: #6e6e73; text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 12px; padding: 0 2px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .col-count {
      background: #e8e8ed; color: #6e6e73;
      font-size: 11px; font-weight: 600;
      padding: 1px 7px; border-radius: 10px;
    }

    /* ── Task (parent) cards — blue ─────────────────── */
    .epic-card {
      background: hsl(215, 40%, 95%);
      border: 1.5px solid hsl(215, 35%, 82%);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .epic-card.drag-over {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
    }

    .task-drag-handle {
      color: #b0bec5; cursor: grab;
      flex-shrink: 0; font-size: 15px; line-height: 1;
      padding: 2px 4px 2px 0;
      touch-action: none; user-select: none;
    }
    .task-drag-handle:hover { color: #6e6e73; }
    .task-drag-handle:active { cursor: grabbing; }
    .epic-card.task-container-dragging { opacity: 0.35; }
    .container-drop-line {
      height: 2px; background: #0071e3;
      border-radius: 2px; margin: 3px 0;
      pointer-events: none;
    }

    .epic-meta {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 10px; gap: 8px;
    }

    .epic-title {
      font-size: 15px; font-weight: 600;
      line-height: 1.4; cursor: grab;
      touch-action: none;
    }
    .epic-title:active { cursor: grabbing; }

    .epic-key-badge {
      font-size: 11px; font-weight: 500;
      color: #6e6e73; background: hsl(215, 35%, 88%);
      padding: 2px 8px; border-radius: 6px;
      white-space: nowrap; flex-shrink: 0;
    }

    .epic-tasks {
      margin-left: 10px;
      padding-left: 12px;
      border-left: 2px solid hsl(215, 25%, 85%);
      min-height: 36px;
      transition: background 0.15s, border-color 0.15s;
      border-radius: 0 6px 6px 0;
    }

    .task-card.card-dragging { opacity: 0.4; }
    .card-drop-line {
      height: 2px; background: #0071e3;
      border-radius: 2px; margin: 2px 0;
      pointer-events: none;
    }

    /* ── TEMP column (right) ────────────────────────── */
    .drop-zone {
      min-height: 200px;
      border-radius: 14px;
      border: 1.5px dashed #d2d2d7;
      padding: 12px;
      background: rgba(255,255,255,0.6);
      transition: border-color 0.15s, background 0.15s;
    }

    .drop-zone.drag-over {
      border-color: #0071e3;
      background: rgba(0,113,227,0.04);
    }

    /* ── Subtask cards — green ───────────────────────── */
    .task-card {
      background: hsl(145, 40%, 93%);
      border: 1px solid hsl(145, 35%, 82%);
      border-radius: 10px;
      padding: 9px 12px;
      margin-bottom: 7px;
      cursor: grab;
      display: flex; align-items: center; gap: 9px;
      transition: background 0.12s, box-shadow 0.12s, opacity 0.15s;
      user-select: none;
    }
    .task-card * { cursor: inherit; }
    .epic-card * { cursor: default; }

    .task-card:last-child { margin-bottom: 0; }

    .task-card:hover {
      background: hsl(145, 40%, 87%);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .task-card.dragging { opacity: 0.35; cursor: grabbing; }

    .drag-handle {
      color: #c7c7cc; font-size: 13px; flex-shrink: 0;
      line-height: 1; cursor: grab; user-select: none; touch-action: none;
    }
    .drag-handle:active { cursor: grabbing; }

    .task-info { flex: 1; min-width: 0; }

    .task-key {
      font-size: 11px; color: #aeaeb2; font-weight: 500;
      margin-bottom: 1px;
    }

    .task-title {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .status-badge {
      font-size: 11px; font-weight: 500;
      padding: 2px 7px; border-radius: 20px;
      flex-shrink: 0; white-space: nowrap;
    }

    .s-todo       { background: #e8e8ed; color: #3a3a3c; }
    .s-inprogress { background: #e8f0fe; color: #1a56db; }
    .s-done       { background: #e4f4eb; color: #1a7f4b; }

    /* ── States ─────────────────────────────────────── */
    .loading-msg {
      text-align: center; padding: 64px 24px;
      color: #aeaeb2; font-size: 14px;
    }

    .empty-msg {
      text-align: center; padding: 16px 8px;
      color: #c7c7cc; font-size: 12px; font-style: italic;
    }

    /* ── Refresh button ─────────────────────────────── */
    .refresh-btn {
      padding: 5px 14px;
      border: 1px solid #d2d2d7; border-radius: 8px;
      background: #fff; font-size: 13px;
      cursor: pointer; color: #1d1d1f;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: #f5f5f7; }
    .refresh-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Transition popup ───────────────────────────── */
    #transition-popup {
      position: fixed;
      background: #fff;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
      padding: 6px;
      z-index: 300;
      min-width: 160px;
      display: none;
    }

    #transition-popup.show { display: block; }

    .transition-item {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s;
    }

    .transition-item:hover { background: #f5f5f7; }

    .transition-loading {
      padding: 10px 14px;
      font-size: 13px;
      color: #aeaeb2;
    }

    .status-badge { cursor: pointer; user-select: none; }
    .status-badge:hover { opacity: 0.8; }

    /* ── Show-more button ──────────────────────────── */
    .show-more-wrap {
      text-align: center;
      margin-top: 4px;
    }
    .show-more-btn {
      padding: 6px 18px;
      border: 1px solid #d2d2d7; border-radius: 20px;
      background: #fff; font-size: 12px; color: #6e6e73;
      cursor: pointer; transition: background 0.15s;
    }
    .show-more-btn:hover { background: #f5f5f7; }
    .epic-card.done-task { opacity: 0.55; }

    /* ── Toast ──────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%);
      background: #1d1d1f; color: #fff;
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none; z-index: 200;
      white-space: nowrap;
    }
    #toast.show       { opacity: 1; }
    #toast.show.error { background: #b91c1c; }
  </style>
</head>
<body>


<!-- App -->
<div id="app" style="display:none">
  <header>
    <div class="header-left">
      <a href="/">← 메인</a>
      <h1>태스크-서브태스크 배열</h1>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">새로고침</button>
      <button class="sign-out-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <main>
    <div id="loading-msg" class="loading-msg">Jira에서 데이터를 불러오는 중...</div>

    <div id="board" style="display:none">
      <div class="columns">
        <!-- Left: Tasks with subtasks -->
        <div>
          <div class="col-header">
            태스크별 서브태스크
            <span class="col-count" id="task-count">0</span>
          </div>
          <div id="tasks-list"></div>
        </div>

        <!-- Right: TEMP subtasks -->
        <div>
          <div class="col-header">
            TEMP (미배정)
            <span class="col-count" id="temp-count">0</span>
          </div>
          <div class="drop-zone" id="temp-zone">
            <div id="temp-list"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="transition-popup"></div>
<div id="toast"></div>

<script src="/auth.js"></script>
<script>
  // ── State ──────────────────────────────────────────
  let parentTasks = [];
  let subtasks = [];
  let tempKey = null;
  let showDoneTasks = false;
  const SUBTASK_LIMIT = 4;
  let expandedTasks = {};

  // ── Auth init (keeps current URL path) ────────────
  function initPage() {
    if (!initSubPageAuth('/arrange_subtask')) return;
    loadData();
  }

  // ── Data loading ───────────────────────────────────
  async function loadData() {
    const btn = document.getElementById('refresh-btn');
    if (btn) btn.disabled = true;
    document.getElementById('loading-msg').style.display = 'block';
    document.getElementById('board').style.display = 'none';

    try {
      const res = await authFetch('/jira/tasks-subtasks');
      if (res.status === 400) { alert('Jira 설정이 없습니다.\n설정 페이지로 이동합니다.'); location.replace('/settings'); return; }
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      parentTasks = data.tasks || [];
      subtasks = data.subtasks || [];
      tempKey = data.temp_key || null;
      render();
      document.getElementById('loading-msg').style.display = 'none';
      document.getElementById('board').style.display = 'block';
      prefetchTransitions(subtasks.map(s => s.key));
    } catch (e) {
      document.getElementById('loading-msg').textContent = '불러오기 실패. 새로고침 해주세요.';
    } finally {
      if (btn) btn.disabled = false;
    }
  }

  async function prefetchTransitions(keys) {
    for (const key of keys) {
      if (transitionsCache[key]) continue;
      try {
        const res = await authFetch(`/jira/issues/${encodeURIComponent(key)}/transitions`);
        if (res.ok) transitionsCache[key] = await res.json();
      } catch (_) {}
    }
  }

  // ── Render ─────────────────────────────────────────
  function statusClass(s, statusCategory) {
    if (statusCategory === 'done') return 's-done';
    if (statusCategory === 'indeterminate') return 's-inprogress';
    if (statusCategory === 'new') return 's-todo';
    const l = (s || '').toLowerCase();
    if (l.includes('done') || l.includes('완료') || l.includes('closed')) return 's-done';
    if (l.includes('progress') || l.includes('진행') || l.includes('review')) return 's-inprogress';
    return 's-todo';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function subtaskCardHtml(st) {
    const sc = statusClass(st.status, st.status_category);
    const doneOpacity = isDoneStatus(st.status, st.status_category) ? 'opacity:.5;' : '';
    return `
      <div class="task-card" data-key="${esc(st.key)}" style="${doneOpacity}" onpointerdown="startCardDrag(event,'${esc(st.key)}','${esc(st.parent_key || '')}')">
        <span class="drag-handle">⠿</span>
        <div class="task-info">
          <div class="task-key">${esc(st.key)}</div>
          <div class="task-title" title="${esc(st.summary)}">${esc(st.summary)}</div>
        </div>
        <span class="status-badge ${sc}" onclick="openTransitionPopup(event, '${esc(st.key)}')">${esc(st.status)}</span>
      </div>`;
  }

  function isDoneStatus(status, statusCategory) {
    if (statusCategory) return statusCategory === 'done';
    const l = (status || '').toLowerCase();
    return l.includes('done') || l.includes('완료') || l.includes('closed') || l.includes('resolved');
  }

  function statusPriority(item) {
    if (isDoneStatus(item.status, item.status_category)) return 4;
    const s = (item.status || '').toLowerCase();
    if (s.includes('always')) return 0;
    if (s.includes('progress') || s.includes('진행') || s.includes('review')) return 1;
    if (s.includes('idea')) return 3;
    return 2;
  }

  function render() {
    // Tasks excluding TEMP
    const visibleTasks = tempKey
      ? parentTasks.filter(t => t.key !== tempKey)
      : parentTasks;

    const activeTasks = visibleTasks.filter(t => !isDoneStatus(t.status, t.status_category));
    const doneTasks   = visibleTasks.filter(t =>  isDoneStatus(t.status, t.status_category));
    activeTasks.sort((a, b) => statusPriority(a) - statusPriority(b));

    // Build map: taskKey → subtasks[]
    const taskMap = {};
    for (const t of visibleTasks) taskMap[t.key] = [];
    const tempSubtasks = [];

    for (const st of subtasks) {
      if (st.parent_key === tempKey) {
        tempSubtasks.push(st);
      } else if (st.parent_key && taskMap[st.parent_key] !== undefined) {
        taskMap[st.parent_key].push(st);
      }
    }
    for (const key of Object.keys(taskMap)) {
      taskMap[key].sort((a, b) => statusPriority(a) - statusPriority(b));
    }
    tempSubtasks.sort((a, b) => statusPriority(a) - statusPriority(b));

    document.getElementById('task-count').textContent = activeTasks.length;
    document.getElementById('temp-count').textContent = tempSubtasks.length;

    function taskCardHtml(t, isDone) {
      const children = taskMap[t.key] || [];
      const expanded = expandedTasks[t.key];
      const visible = expanded ? children : children.slice(0, SUBTASK_LIMIT);
      const childrenHtml = visible.length > 0
        ? visible.map(subtaskCardHtml).join('')
        : '<div class="empty-msg">서브태스크 없음</div>';
      const moreBtn = children.length > SUBTASK_LIMIT
        ? `<div class="show-more-wrap"><button class="show-more-btn" onclick="toggleTaskExpand('${esc(t.key)}')">
            ${expanded ? '접기' : `더보기 (${children.length - SUBTASK_LIMIT}개)`}
           </button></div>`
        : '';
      return `
        <div class="epic-card${isDone ? ' done-task' : ''}" data-key="${esc(t.key)}">
          <div class="epic-meta">
            <div style="display:flex;align-items:center;gap:6px;flex:1;min-width:0">
              <span class="task-drag-handle" onpointerdown="startTaskDrag(event,'${esc(t.key)}')">⠿</span>
              <div class="epic-title" onpointerdown="startTaskDrag(event,'${esc(t.key)}')">${esc(t.summary)}</div>
            </div>
            <span class="epic-key-badge">${esc(t.key)}</span>
          </div>
          <div class="epic-tasks">
            ${childrenHtml}${moreBtn}
          </div>
        </div>`;
    }

    // Left column: tasks with subtasks
    const tasksList = document.getElementById('tasks-list');
    if (visibleTasks.length === 0) {
      tasksList.innerHTML = '<div class="empty-msg">태스크 없음</div>';
    } else {
      const activeHtml = activeTasks.map(t => taskCardHtml(t, false)).join('');
      const doneHtml   = showDoneTasks ? doneTasks.map(t => taskCardHtml(t, true)).join('') : '';
      const doneBtnHtml = doneTasks.length > 0
        ? `<div class="show-more-wrap">
            <button class="show-more-btn" onclick="toggleDoneTasks()">
              ${showDoneTasks ? '완료 접기' : `완료된 태스크 ${doneTasks.length}개`}
            </button>
          </div>`
        : '';
      tasksList.innerHTML = activeHtml + doneBtnHtml + doneHtml;
    }

    // Right column: TEMP subtasks
    const tempList = document.getElementById('temp-list');
    tempList.innerHTML = tempSubtasks.length > 0
      ? tempSubtasks.map(subtaskCardHtml).join('')
      : '<div class="empty-msg">TEMP 서브태스크 없음</div>';
  }

  function toggleDoneTasks() { showDoneTasks = !showDoneTasks; render(); }
  function toggleTaskExpand(key) { expandedTasks[key] = !expandedTasks[key]; render(); }

  // ── Task container drag (reorder tasks) ───────────
  let taskDragState = null;

  function renderedTaskOrder() {
    const vis = tempKey ? parentTasks.filter(t => t.key !== tempKey) : parentTasks;
    const active = vis.filter(t => !isDoneStatus(t.status, t.status_category));
    const done   = vis.filter(t =>  isDoneStatus(t.status, t.status_category));
    return { active, done };
  }

  function startTaskDrag(event, key) {
    event.preventDefault();
    event.stopPropagation();
    window.getSelection()?.removeAllRanges();
    const { active, done } = renderedTaskOrder();
    const rendered = [...active, ...(showDoneTasks ? done : [])];
    const fromIdx = rendered.findIndex(t => t.key === key);
    if (fromIdx === -1) return;
    const cardEl = document.querySelector(`#tasks-list .epic-card[data-key="${CSS.escape(key)}"]`);
    if (!cardEl) return;
    const handle = event.currentTarget;
    handle.setPointerCapture(event.pointerId);
    cardEl.classList.add('task-container-dragging');
    taskDragState = { key, fromIdx, toIdx: fromIdx, cardEl, handle };
    handle.addEventListener('pointermove', onTaskMove);
    handle.addEventListener('pointerup', onTaskEnd);
    handle.addEventListener('pointercancel', onTaskEnd);
  }

  function onTaskMove(event) {
    if (!taskDragState) return;
    const tasksList = document.getElementById('tasks-list');
    document.querySelectorAll('.container-drop-line').forEach(e => e.remove());
    const others = Array.from(tasksList.querySelectorAll('.epic-card:not(.task-container-dragging)'));
    let toIdx = others.length;
    for (let i = 0; i < others.length; i++) {
      const r = others[i].getBoundingClientRect();
      if (event.clientY < r.top + r.height / 2) { toIdx = i; break; }
    }
    const line = document.createElement('div');
    line.className = 'container-drop-line';
    if (toIdx < others.length) tasksList.insertBefore(line, others[toIdx]);
    else tasksList.appendChild(line);
    taskDragState.toIdx = toIdx;
  }

  function onTaskEnd() {
    if (!taskDragState) return;
    const { key, fromIdx, toIdx, cardEl, handle } = taskDragState;
    taskDragState = null;
    cardEl.classList.remove('task-container-dragging');
    handle.removeEventListener('pointermove', onTaskMove);
    handle.removeEventListener('pointerup', onTaskEnd);
    handle.removeEventListener('pointercancel', onTaskEnd);
    document.querySelectorAll('.container-drop-line').forEach(e => e.remove());
    if (toIdx === fromIdx) return;
    const { active, done } = renderedTaskOrder();
    const rendered = [...active, ...(showDoneTasks ? done : [])];
    const [moved] = rendered.splice(fromIdx, 1);
    rendered.splice(toIdx, 0, moved);
    const newActive = rendered.filter(t => !isDoneStatus(t.status, t.status_category));
    const newDone   = showDoneTasks ? rendered.filter(t => isDoneStatus(t.status, t.status_category)) : done;
    const newOrder  = [...newActive, ...newDone];
    const tempTask  = tempKey ? parentTasks.find(t => t.key === tempKey) : null;
    parentTasks.splice(0, parentTasks.length, ...newOrder);
    if (tempTask) parentTasks.push(tempTask);
    render();
    authFetch('/jira/order', { method: 'POST', body: JSON.stringify({ keys: newOrder.map(t => t.key) }) }).catch(() => {});
  }

  // ── Card drag (pointer events) ─────────────────────
  let cardDragState = null;

  function startCardDrag(event, key, parentKey) {
    if (event.target.closest('button, input, a, .status-badge')) return;
    event.preventDefault();
    window.getSelection()?.removeAllRanges();
    // parentKey is the current parent task key (tempKey for TEMP zone)
    const containerSubs = subtasks.filter(s => s.parent_key === parentKey);
    const fromIdx = containerSubs.findIndex(s => s.key === key);
    if (fromIdx === -1) return;
    const cardEl = document.querySelector(`.task-card[data-key="${CSS.escape(key)}"]`);
    if (!cardEl) return;
    cardEl.setPointerCapture(event.pointerId);
    cardEl.classList.add('card-dragging');
    cardDragState = { key, parentKey, fromIdx, toParentKey: parentKey, toIdx: fromIdx, cardEl };
    cardEl.addEventListener('pointermove', onCardMove);
    cardEl.addEventListener('pointerup', onCardEnd);
    cardEl.addEventListener('pointercancel', onCardEnd);
  }

  function onCardMove(event) {
    if (!cardDragState) return;
    cardDragState.cardEl.style.pointerEvents = 'none';
    const el = document.elementFromPoint(event.clientX, event.clientY);
    cardDragState.cardEl.style.pointerEvents = '';
    document.querySelectorAll('.epic-card.drag-over, .drop-zone.drag-over').forEach(e => e.classList.remove('drag-over'));
    document.querySelectorAll('.card-drop-line').forEach(e => e.remove());
    if (!el) { cardDragState.toParentKey = cardDragState.parentKey; cardDragState.toIdx = cardDragState.fromIdx; return; }
    const taskCard = el.closest('.epic-card[data-key]');
    let toParentKey, dropArea, containerEl;
    if (taskCard) {
      toParentKey = taskCard.dataset.key;
      dropArea = taskCard.querySelector('.epic-tasks');
      containerEl = taskCard;
    } else {
      const zone = document.getElementById('temp-zone');
      if (zone && (zone === el || zone.contains(el))) {
        toParentKey = tempKey;
        dropArea = document.getElementById('temp-list');
        containerEl = zone;
      } else {
        cardDragState.toParentKey = cardDragState.parentKey; cardDragState.toIdx = cardDragState.fromIdx; return;
      }
    }
    containerEl.classList.add('drag-over');
    const otherCards = Array.from(dropArea.querySelectorAll('.task-card:not(.card-dragging)'));
    let toIdx = otherCards.length;
    for (let i = 0; i < otherCards.length; i++) {
      const r = otherCards[i].getBoundingClientRect();
      if (event.clientY < r.top + r.height / 2) { toIdx = i; break; }
    }
    const line = document.createElement('div');
    line.className = 'card-drop-line';
    if (toIdx < otherCards.length) dropArea.insertBefore(line, otherCards[toIdx]); else dropArea.appendChild(line);
    cardDragState.toParentKey = toParentKey;
    cardDragState.toIdx = toIdx;
  }

  function onCardEnd() {
    if (!cardDragState) return;
    const { key, parentKey, fromIdx, toParentKey, toIdx, cardEl } = cardDragState;
    cardDragState = null;
    cardEl.classList.remove('card-dragging');
    cardEl.removeEventListener('pointermove', onCardMove);
    cardEl.removeEventListener('pointerup', onCardEnd);
    cardEl.removeEventListener('pointercancel', onCardEnd);
    document.querySelectorAll('.epic-card.drag-over, .drop-zone.drag-over').forEach(e => e.classList.remove('drag-over'));
    document.querySelectorAll('.card-drop-line').forEach(e => e.remove());
    const st = subtasks.find(s => s.key === key);
    if (!st) return;
    if (toParentKey === parentKey) {
      // Same container: reorder
      if (toIdx === fromIdx) return;
      const ct = subtasks.filter(s => s.parent_key === parentKey);
      const [moved] = ct.splice(fromIdx, 1);
      ct.splice(toIdx, 0, moved);
      const gi = []; subtasks.forEach((s, i) => { if (s.parent_key === parentKey) gi.push(i); });
      gi.forEach((idx, i) => { subtasks[idx] = ct[i]; });
      render();
      authFetch('/jira/order', { method: 'POST', body: JSON.stringify({ keys: ct.map(s => s.key) }) }).catch(() => {});
    } else {
      // Different container: reassign
      const prevParent = st.parent_key;
      st.parent_key = toParentKey;
      render();
      authFetch(`/jira/subtasks/${encodeURIComponent(key)}/parent`, {
        method: 'PATCH', body: JSON.stringify({ task_key: toParentKey }),
      }).then(res => {
        if (!res.ok) throw new Error();
        showToast(`${key} → ${toParentKey}`);
      }).catch(() => { showToast('업데이트 실패', 'error'); st.parent_key = prevParent; render(); });
    }
  }

  // ── Transition popup ───────────────────────────────
  let popupIssueKey = null;
  const transitionsCache = {};

  async function openTransitionPopup(event, issueKey) {
    event.stopPropagation();
    event.preventDefault();

    const popup = document.getElementById('transition-popup');
    popupIssueKey = issueKey;
    popup.classList.add('show');
    positionPopup(popup, event.target);

    if (transitionsCache[issueKey]) {
      renderPopup(transitionsCache[issueKey]);
      return;
    }

    popup.innerHTML = '<div class="transition-loading">로딩 중...</div>';
    try {
      const res = await authFetch(`/jira/issues/${encodeURIComponent(issueKey)}/transitions`);
      const transitions = await res.json();
      transitionsCache[issueKey] = transitions;
      renderPopup(transitions);
    } catch (e) {
      popup.innerHTML = '<div class="transition-loading">로드 실패</div>';
    }
  }

  function renderPopup(transitions) {
    const popup = document.getElementById('transition-popup');
    if (!transitions.length) {
      popup.innerHTML = '<div class="transition-loading">가능한 전환 없음</div>';
      return;
    }
    popup.innerHTML = transitions.map(t =>
      `<div class="transition-item" onclick="applyTransition('${esc(t.id)}', '${esc(t.name)}')">${esc(t.name)}</div>`
    ).join('');
  }

  function positionPopup(popup, anchor) {
    const rect = anchor.getBoundingClientRect();
    popup.style.top = (rect.bottom + 6) + 'px';
    popup.style.left = rect.left + 'px';
    const pw = 180;
    if (rect.left + pw > window.innerWidth) {
      popup.style.left = (window.innerWidth - pw - 8) + 'px';
    }
  }

  async function applyTransition(transitionId, transitionName) {
    const popup = document.getElementById('transition-popup');
    popup.classList.remove('show');

    const issueKey = popupIssueKey;
    const st = subtasks.find(s => s.key === issueKey);
    if (!st) return;

    const prevStatus = st.status;
    st.status = transitionName;
    delete transitionsCache[issueKey];
    render();

    try {
      const res = await authFetch(`/jira/issues/${encodeURIComponent(issueKey)}/transitions`, {
        method: 'POST',
        body: JSON.stringify({ transition_id: transitionId }),
      });
      if (!res.ok) throw new Error(await res.text());
      showToast(`${issueKey} → ${transitionName}`);
    } catch (e) {
      showToast('상태 변경 실패', 'error');
      st.status = prevStatus;
      render();
    }
  }

  document.addEventListener('click', (e) => {
    const popup = document.getElementById('transition-popup');
    if (!popup.contains(e.target)) popup.classList.remove('show');
  });

  // ── Toast ──────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = type === 'error' ? 'show error' : 'show';
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 2800);
  }

  // ── Boot ───────────────────────────────────────────
  initPage();
</script>
</body>
</html>
